<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPO Connect — The Peer Network for Senior Product Leaders</title>

    <!-- SEO -->
    <meta name="description" content="A private peer network for senior product leaders. Real conversations from those who've lived it — built on openness, trust, and shared experience." />
    <meta name="keywords" content="CPO, Chief Product Officer, product leadership, peer network, product community, senior product leaders, product management" />
    <link rel="canonical" href="https://cpoconnect.club/" />
    <meta name="author" content="CPO Connect" />
    <meta name="publisher" content="CPO Connect" />
    <meta name="robots" content="index, follow" />

    <!-- OpenGraph -->
    <meta property="og:title" content="CPO Connect — The Peer Network for Senior Product Leaders" />
    <meta property="og:description" content="A private peer network for senior product leaders. Real conversations from those who've lived it — built on openness, trust, and shared experience." />
    <meta property="og:image" content="https://cpoconnect.club/pwa-icon-512.png" />
    <meta property="og:url" content="https://cpoconnect.club/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CPO Connect" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CPO Connect — The Peer Network for Senior Product Leaders" />
    <meta name="twitter:description" content="A private peer network for senior product leaders. Real conversations from those who've lived it." />
    <meta name="twitter:image" content="https://cpoconnect.club/pwa-icon-512.png" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CPO Connect",
      "url": "https://cpoconnect.club/",
      "logo": "https://cpoconnect.club/pwa-icon-512.png",
      "description": "A private peer network for senior product leaders."
    }
    </script>

    <script>
      // Prevent theme flash — runs before React
      (function() {
        var theme = localStorage.getItem('cpo-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
