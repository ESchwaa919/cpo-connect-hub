<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPO Connect — Peer Community for Chief Product Officers</title>

    <!-- SEO -->
    <meta name="description" content="CPO Connect is the CPO community for Chief Product Officers and senior product leaders — real conversations, peer-to-peer learning, built on trust." />
    <meta name="keywords" content="CPO Connect, CPO community, Chief Product Officer community, Chief Product Officer, product leadership community, peer network, senior product leaders, Head of Product, VP Product, product management community" />
    <link rel="canonical" href="https://cpoconnect.club/" />
    <meta name="author" content="CPO Connect" />
    <meta name="publisher" content="CPO Connect" />
    <meta name="robots" content="index, follow" />

    <!-- OpenGraph -->
    <meta property="og:title" content="CPO Connect — Peer Community for Chief Product Officers" />
    <meta property="og:description" content="CPO Connect is the CPO community for Chief Product Officers and senior product leaders — real conversations, peer-to-peer learning, built on trust." />
    <meta property="og:image" content="https://cpoconnect.club/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CPO Connect — The peer network for senior product leaders. A private community built on openness, trust, and shared experience." />
    <meta property="og:url" content="https://cpoconnect.club/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CPO Connect" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CPO Connect — Peer Community for Chief Product Officers" />
    <meta name="twitter:description" content="The CPO community for Chief Product Officers and senior product leaders. Built on openness, trust, and shared experience." />
    <meta name="twitter:image" content="https://cpoconnect.club/og-image.png" />
    <meta name="twitter:image:alt" content="CPO Connect — The peer network for senior product leaders." />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CPO Connect",
      "alternateName": "CPO Connect Club",
      "url": "https://cpoconnect.club/",
      "logo": "https://cpoconnect.club/pwa-icon-512.png",
      "description": "CPO Connect is the CPO community — leaders who've lived it. A private peer community for Chief Product Officers and senior product leaders, built on openness, trust, and shared experience.",
      "slogan": "By CPOs, for CPOs.",
      "sameAs": [
        "https://www.linkedin.com/company/cpo-connect-club"
      ]
    }
    </script>

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CPO Connect",
      "url": "https://cpoconnect.club/",
      "description": "CPO Connect is the CPO community — leaders who've lived it. A private peer community for Chief Product Officers and senior product leaders, built on openness, trust, and shared experience."
    }
    </script>

    <script>
      // Prevent theme flash — runs before React
      (function() {
        var theme = localStorage.getItem('cpo-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
